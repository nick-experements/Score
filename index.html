<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Score</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
    <h2>Розрахуй свій SCORE2</h2>
    <h5>Для людей віком від 40 до 69 років</h5>
    <label>Вік</label>
    <input type="number" id="age" min="40" max="69">

    <label>Стать</label>
    <select id="sex">
        <option value="male">Чоловік</option>
        <option value="female">Жінка</option>
    </select>


    <label>Куріння</label>
    <select id="smoking">
        <option value="male">Так</option>
        <option value="female">Ні</option>
    </select>

    <label>Систолічний тиск</label>
    <input type="number" id="bp">


    <label >Холестерин</label>
    <input type="number" step="0.1" id="chol">





    <button onclick="calculateScore()">Розрахувати</button>

    <div id="result" class="result">
        <div class="anwser-report">
            <div class="risk-category">
            
            </div>

            <div class="risk-vallue" style="font-size:16px;">
                10-річний ризик: <b id="risk-vallue-number">%</b>
            </div>

            <div class="model-description">
                Модель: SCORE2 / ESC (клінічна апроксимація)
            </div>

            <div class="recomendation">

                Рекомендація: <span id="recomendation-text"></span>
            </div>
        </div>
        <div class="contact-wrapper">
            <div class="on-list-text">
                Записатися до лікаря <br>та отримати<br> рекомендації:
                
                <br> <span id="telephone-number">📞 0960833349</span><br>
                
            </div>
            <div class="on-list-img">
                <a href="https://www.facebook.com/people/%D0%9A%D0%B0%D1%80%D0%B4%D1%96%D0%BE%D0%BB%D0%BE%D0%B3-%D0%A3%D0%97%D0%94-%D0%A2%D1%80%D1%83%D1%81%D0%BA%D0%B0%D0%B2%D0%B5%D1%86%D1%8C/61551013525542/?rdid=14sVbn0AKCHdTjKN&share_url=https%3A%2F%2Fwww.facebook.com%2Fshare%2F1894bPjE7N%2F" target="_blank">
                    <img class="img" src="img/symbol.png" alt="Емблема">
                </a>
            </div>
        </div>
    </div>

    


    <div id="onList" class="onList"></div>
    <script src="main.js"></script>
    <script src="./js/buildTable.js"></script>
</div>
</body>
</html>
